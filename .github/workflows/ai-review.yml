name: AI Code Review

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review'
        required: true
        type: string
      mode:
        description: 'Review mode'
        required: false
        default: 'basic'
        type: choice
        options:
          - basic
          - deep

concurrency:
  group: ai-review-${{ github.event.pull_request.number || inputs.pr_number }}
  cancel-in-progress: true

jobs:
  ai-review:
    # Skip draft PRs unless triggered manually
    if: github.event.pull_request.draft == false || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: write

    env:
      PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
      MODE: ${{ github.event.inputs.mode || 'basic' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Run AI review
        run: npx tsx scripts/review.ts --pr "$PR_NUMBER" --mode "$MODE" --output all
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload review artifact
        uses: actions/upload-artifact@v4
        if: always()
        continue-on-error: true
        with:
          name: ai-review-pr-${{ env.PR_NUMBER }}-${{ env.MODE }}
          path: reviews/*.md
          retention-days: 30
